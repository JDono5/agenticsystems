[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = [
  "chromium",
  "chromium-driver",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "libX11",
  "libXcomposite",
  "libXdamage",
  "libXext",
  "libXfixes",
  "libXrandr",
  "libgbm",
  "pango",
  "cairo",
  "alsa-lib",
]

[build.nixpacksPlan.phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
]

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
